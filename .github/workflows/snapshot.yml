name: Snapshot

on:
  push:
    branches: [main]

concurrency:
  group: snapshot
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      HUSKY: "0"

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.10"
          no-cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

  publish:
    name: Publish Preview
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      contents: read
      id-token: write # Required for npm provenance (OIDC signing)
    env:
      HUSKY: "0"

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.10"
          no-cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Check for pending changesets
        id: changesets
        run: |
          if bunx changeset status 2>&1 | grep -q "No changesets present"; then
            echo "has_changesets=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changesets=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Version (snapshot)
        if: steps.changesets.outputs.has_changesets == 'true'
        run: bunx changeset version --snapshot preview

      - name: Configure npm auth
        if: steps.changesets.outputs.has_changesets == 'true'
        run: printf '//registry.npmjs.org/:_authToken=%s\n' "$NPM_TOKEN" > .npmrc
        env:
          NPM_TOKEN: ${{ secrets.WEAVEIO_NPM_TOKEN }}

      - name: Publish snapshot
        if: steps.changesets.outputs.has_changesets == 'true'
        run: bunx changeset publish --tag preview
        env:
          NPM_CONFIG_PROVENANCE: "true"
